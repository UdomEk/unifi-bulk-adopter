<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>UniFi Bulk AP Adopter</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 16px;
      padding-bottom: 80px;
    }

    /* Hide Telegram's auto-generated footer */
    .tgme_footer,
    .tgme_footer_text,
    .tgme_nav_footer,
    [class*="footer_"],
    [class*="username_"] {
      display: none !important;
      height: 0 !important;
      opacity: 0 !important;
      visibility: hidden !important;
      pointer-events: none !important;
    }

    .container {
      max-width: 640px;
      width: 100%;
      margin: 0 auto;
    }

    .card {
      background: linear-gradient(145deg, #14141e, #1a1a2e);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .header-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #4CAF50, #2e7d32);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 700;
      color: #ffffff;
    }

    .header .subtitle {
      font-size: 14px;
      color: #8888aa;
      margin-top: 2px;
    }

    .badge {
      display: inline-block;
      background: rgba(76, 175, 80, 0.15);
      color: #4CAF50;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: 20px;
      margin-left: 8px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-item {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 12px;
      padding: 12px 16px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.04);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .stat-item:hover {
      background: rgba(255, 255, 255, 0.06);
    }

    .stat-number {
      font-size: 24px;
      font-weight: 700;
      color: #ffffff;
    }

    .stat-number.green { color: #4CAF50; }
    .stat-number.red { color: #ef5350; }

    .stat-label {
      font-size: 11px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 2px;
    }

    .stat-item .hint {
      font-size: 9px;
      color: #444;
      margin-top: 4px;
    }

    .textarea-wrapper {
      position: relative;
      margin-bottom: 16px;
    }

    .textarea-wrapper label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #aaa;
      margin-bottom: 8px;
    }

    .textarea-wrapper textarea {
      width: 100%;
      min-height: 200px;
      background: #0d0d18;
      color: #b0ffb0;
      padding: 16px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      line-height: 1.7;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 14px;
      resize: vertical;
      outline: none;
    }

    .textarea-wrapper textarea:focus {
      border-color: #4CAF50;
    }

    .char-count {
      position: absolute;
      bottom: 12px;
      right: 14px;
      font-size: 11px;
      color: #444;
      background: rgba(0, 0, 0, 0.6);
      padding: 2px 10px;
      border-radius: 10px;
      pointer-events: none;
    }

    .btn-group {
      display: flex;
      gap: 10px;
      margin: 8px 0 20px 0;
      flex-wrap: wrap;
    }

    .btn {
      flex: 1;
      min-width: 100px;
      padding: 14px 20px;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.04);
      color: #aaa;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .btn-primary {
      background: linear-gradient(135deg, #4CAF50, #2e7d32);
      color: #fff;
      border: none;
      box-shadow: 0 4px 20px rgba(76, 175, 80, 0.25);
      flex: 2;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(76, 175, 80, 0.35);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.04);
      color: #aaa;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #progress {
      padding: 14px 18px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.03);
      margin: 12px 0 16px 0;
      font-size: 14px;
      font-weight: 500;
      color: #aaa;
      display: none;
      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    #progress.active {
      display: block;
    }

    #result {
      margin-top: 16px;
    }

    .result-summary {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 18px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 12px;
      margin-bottom: 14px;
      border: 1px solid rgba(255, 255, 255, 0.04);
      flex-wrap: wrap;
      gap: 10px;
    }

    .result-summary .total {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
    }

    .result-summary .stats-mini {
      display: flex;
      gap: 16px;
      font-size: 13px;
    }

    .result-summary .stats-mini .ok { color: #4CAF50; }
    .result-summary .stats-mini .fail { color: #ef5350; }

    .filter-buttons {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 6px 16px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 20px;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.03);
      color: #888;
      transition: all 0.2s;
    }

    .filter-btn:hover {
      background: rgba(255, 255, 255, 0.06);
      color: #fff;
    }

    .filter-btn.active {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      border-color: rgba(255, 255, 255, 0.15);
    }

    .filter-btn.active-success {
      background: rgba(76, 175, 80, 0.15);
      color: #4CAF50;
      border-color: rgba(76, 175, 80, 0.2);
    }

    .filter-btn.active-failed {
      background: rgba(239, 83, 80, 0.15);
      color: #ef5350;
      border-color: rgba(239, 83, 80, 0.2);
    }

    .result-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 300px;
      overflow-y: auto;
    }

    .result-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.02);
      border-radius: 10px;
      font-size: 13px;
      border: 1px solid rgba(255, 255, 255, 0.03);
    }

    .result-item .ip {
      font-family: 'Courier New', monospace;
      font-weight: 500;
      color: #ddd;
      min-width: 110px;
    }

    .result-item .status {
      font-weight: 500;
      font-size: 12px;
      padding: 2px 10px;
      border-radius: 20px;
      margin-left: auto;
      flex-shrink: 0;
    }

    .result-item .status.success {
      background: rgba(76, 175, 80, 0.12);
      color: #4CAF50;
    }

    .result-item .status.fail {
      background: rgba(239, 83, 80, 0.12);
      color: #ef5350;
    }

    .result-item .error-msg {
      color: #888;
      font-size: 12px;
      margin-left: 8px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 120px;
    }

    .result-item .retry-btn {
      padding: 3px 12px;
      font-size: 11px;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: rgba(76, 175, 80, 0.15);
      color: #4CAF50;
      transition: all 0.25s ease;
      flex-shrink: 0;
    }

    .result-item .retry-btn:hover {
      background: rgba(76, 175, 80, 0.25);
    }

    .result-item.hidden {
      display: none;
    }

    .no-results {
      text-align: center;
      color: #666;
      padding: 30px 0;
      font-size: 14px;
    }

    .footer {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: #444;
    }

    .footer .brand {
      color: #4CAF50;
      font-weight: 500;
    }

    .footer .brand span {
      color: #666;
      font-weight: 400;
    }

    .footer .time {
      color: #444;
      font-size: 11px;
    }

    @media (max-width: 500px) {
      body { padding: 12px; }
      .card { padding: 20px; }
      .header h1 { font-size: 18px; }
      .header-icon { width: 40px; height: 40px; font-size: 20px; }
      .stats { grid-template-columns: repeat(3, 1fr); gap: 8px; }
      .stat-item { padding: 8px 10px; }
      .stat-number { font-size: 18px; }
      .stat-item .hint { display: none; }
      .btn-group { flex-direction: column; }
      .btn { min-width: unset; }
      .btn-primary { flex: 1; }
      .result-summary { flex-direction: column; gap: 8px; align-items: flex-start; }
      .footer { flex-direction: column; gap: 6px; text-align: center; }
      .textarea-wrapper textarea { min-height: 150px; }
      .filter-buttons { gap: 6px; }
      .filter-btn { font-size: 11px; padding: 4px 12px; }
    }

    .result-list::-webkit-scrollbar {
      width: 4px;
    }
    .result-list::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.02);
      border-radius: 10px;
    }
    .result-list::-webkit-scrollbar-thumb {
      background: rgba(76, 175, 80, 0.3);
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">

      <!-- HEADER -->
      <div class="header">
        <div class="header-icon">📡</div>
        <div>
          <h1>UniFi Bulk AP Adopter <span class="badge">v2.0</span></h1>
          <div class="subtitle">Adopt multiple UniFi Access Points at once via SSH</div>
        </div>
      </div>

      <!-- STATS -->
      <div class="stats">
        <div class="stat-item" id="statAll">
          <div class="stat-number" id="totalCount">0</div>
          <div class="stat-label">Total APs</div>
          <div class="hint">▼ show all</div>
        </div>
        <div class="stat-item" id="statSuccess">
          <div class="stat-number green" id="successCount">0</div>
          <div class="stat-label">Successful</div>
          <div class="hint">▼ show success</div>
        </div>
        <div class="stat-item" id="statFailed">
          <div class="stat-number red" id="failCount">0</div>
          <div class="stat-label">Failed</div>
          <div class="hint">▼ show failed</div>
        </div>
      </div>

      <!-- TEXTAREA -->
      <div class="textarea-wrapper">
        <label>📋 AP IP Addresses <span style="color:#666;font-weight:400;">(one per line)</span></label>
        <textarea id="ips" placeholder="192.168.1.10&#10;192.168.1.11&#10;192.168.1.12"></textarea>
        <span class="char-count" id="ipCount">0 IPs</span>
      </div>

      <!-- BUTTONS -->
      <div class="btn-group">
        <button class="btn btn-primary" id="adoptBtn">🚀 Adopt All APs</button>
        <button class="btn btn-secondary" id="clearBtn">✕ Clear</button>
        <button class="btn btn-secondary" id="sampleBtn">📝 Sample</button>
      </div>

      <!-- PROGRESS -->
      <div id="progress"><span id="progressText">⏳ Processing 0 APs...</span></div>

      <!-- RESULTS -->
      <div id="result"></div>

      <!-- FOOTER -->
      <div class="footer">
        <span class="brand">Access Point <span>— UniFi Tool</span></span>
        <span class="time">⚡ <span id="timestamp"></span></span>
      </div>

    </div>
  </div>

  <script>
    (function() {
      "use strict";

      // ============================================
      // TELEGRAM WEB APP
      // ============================================
      var tg;
      try {
        tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
      } catch(e) {
        console.log('Telegram WebApp not available');
      }

      // ============================================
      // HIDE TELEGRAM FOOTER
      // ============================================
      function hideFooter() {
        try {
          var elements = document.querySelectorAll('*');
          for (var i = 0; i < elements.length; i++) {
            var el = elements[i];
            if (el.textContent && el.textContent.indexOf('@unifi_adoption_bot') !== -1) {
              el.style.display = 'none';
            }
          }
        } catch(e) {}
      }
      setTimeout(hideFooter, 500);
      setTimeout(hideFooter, 1000);
      setTimeout(hideFooter, 2000);

      // ============================================
      // DOM ELEMENTS
      // ============================================
      var ipsTextarea = document.getElementById('ips');
      var adoptBtn = document.getElementById('adoptBtn');
      var clearBtn = document.getElementById('clearBtn');
      var sampleBtn = document.getElementById('sampleBtn');
      var progress = document.getElementById('progress');
      var progressText = document.getElementById('progressText');
      var resultDiv = document.getElementById('result');
      var totalCount = document.getElementById('totalCount');
      var successCount = document.getElementById('successCount');
      var failCount = document.getElementById('failCount');
      var ipCount = document.getElementById('ipCount');
      var timestamp = document.getElementById('timestamp');
      var statAll = document.getElementById('statAll');
      var statSuccess = document.getElementById('statSuccess');
      var statFailed = document.getElementById('statFailed');

      var currentFilter = 'all';

      // ============================================
      // HELPERS
      // ============================================
      function getIPs() {
        var lines = ipsTextarea.value.split('\n');
        var result = [];
        for (var i = 0; i < lines.length; i++) {
          var ip = lines[i].trim();
          if (ip) result.push(ip);
        }
        return result;
      }

      function getIPsWithComments() {
        var lines = ipsTextarea.value.split('\n');
        var result = [];
        for (var i = 0; i < lines.length; i++) {
          var ip = lines[i].trim();
          if (ip && ip.indexOf('#') !== 0) result.push(ip);
        }
        return result;
      }

      function setStats(total, success, fail) {
        totalCount.textContent = total;
        successCount.textContent = success;
        failCount.textContent = fail;
      }

      function showProgress(text, show) {
        progress.className = show ? 'active' : '';
        progressText.textContent = text;
      }

      function setTimestamp() {
        var now = new Date();
        timestamp.textContent = now.toLocaleTimeString();
      }
      setTimestamp();
      setInterval(setTimestamp, 30000);

      // ============================================
      // FILTER
      // ============================================
      function filterList(filter) {
        currentFilter = filter;
        var items = document.querySelectorAll('.result-item');
        var visible = 0;

        for (var i = 0; i < items.length; i++) {
          var item = items[i];
          var isSuccess = item.getAttribute('data-success') === 'true';
          var show = false;
          if (filter === 'all') show = true;
          else if (filter === 'success') show = isSuccess;
          else if (filter === 'failed') show = !isSuccess;

          if (show) {
            item.classList.remove('hidden');
            visible++;
          } else {
            item.classList.add('hidden');
          }
        }

        // Update button states
        var btns = document.querySelectorAll('.filter-btn');
        for (var j = 0; j < btns.length; j++) {
          var btn = btns[j];
          btn.className = 'filter-btn';
          if (btn.getAttribute('data-filter') === filter) {
            btn.classList.add('active');
          }
        }
      }

      // ============================================
      // RETRY
      // ============================================
      function retryAp(ip) {
        if (!confirm('Retry ' + ip + '?')) return;

        var btn = document.querySelector('.result-item[data-ip="' + ip + '"] .retry-btn');
        if (btn) {
          btn.textContent = '⏳';
          btn.disabled = true;
        }

        fetch('https://unifi-bulk-adopter-production.up.railway.app/adopt-bulk', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ips: [ip] })
        })
        .then(function(res) { return res.json(); })
        .then(function(data) {
          var result = data.results[0];
          var item = document.querySelector('.result-item[data-ip="' + ip + '"]');
          if (item) {
            if (result.success) {
              item.setAttribute('data-success', 'true');
              var statusEl = item.querySelector('.status');
              statusEl.className = 'status success';
              statusEl.textContent = '✅ Adopted';
              var err = item.querySelector('.error-msg');
              if (err) err.remove();
              var retry = item.querySelector('.retry-btn');
              if (retry) retry.remove();
            } else {
              var errMsg = item.querySelector('.error-msg');
              if (!errMsg) {
                errMsg = document.createElement('span');
                errMsg.className = 'error-msg';
                item.appendChild(errMsg);
              }
              errMsg.textContent = result.error || 'Retry failed';
            }
          }

          var success = document.querySelectorAll('.result-item[data-success="true"]').length;
          var failed = document.querySelectorAll('.result-item[data-success="false"]').length;
          setStats(success + failed, success, failed);

          filterList(currentFilter);
        })
        .catch(function(err) {
          alert('Error: ' + err.message);
        });
      }

      // ============================================
      // CLEAR
      // ============================================
      function clearAll() {
        ipsTextarea.value = '';
        resultDiv.innerHTML = '';
        showProgress('', false);
        ipCount.textContent = '0 IPs';
        setStats(0, 0, 0);
        adoptBtn.disabled = false;
        adoptBtn.innerHTML = '🚀 Adopt All APs';
      }

      // ============================================
      // SAMPLE
      // ============================================
      function loadSample() {
        ipsTextarea.value = '192.168.1.10\n192.168.1.11\n192.168.1.12\n192.168.1.13\n192.168.1.14';
        var event = new Event('input');
        ipsTextarea.dispatchEvent(event);
      }

      // ============================================
      // ADOPT
      // ============================================
      function startAdoption() {
        var ips = getIPsWithComments();

        if (ips.length === 0) {
          alert('Please paste at least one IP address.');
          return;
        }

        if (!confirm('Adopt ' + ips.length + ' AP(s)?')) return;

        adoptBtn.disabled = true;
        adoptBtn.innerHTML = '<span class="spinner"></span> Adopting...';
        resultDiv.innerHTML = '';
        showProgress('⏳ Processing ' + ips.length + ' APs...', true);
        setStats(ips.length, '…', '…');

        fetch('https://unifi-bulk-adopter-production.up.railway.app/adopt-bulk', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ips: ips })
        })
        .then(function(res) { return res.json(); })
        .then(function(data) {
          var success = 0;
          var fail = 0;

          var html = '';
          html += '<div class="filter-buttons">';
          html += '<button class="filter-btn active" data-filter="all" onclick="window.filterList(\'all\')">📊 All (' + data.total + ')</button>';
          html += '<button class="filter-btn" data-filter="success" onclick="window.filterList(\'success\')">✅ Success (0)</button>';
          html += '<button class="filter-btn" data-filter="failed" onclick="window.filterList(\'failed\')">❌ Failed (0)</button>';
          html += '</div>';

          html += '<div class="result-summary">';
          html += '<span class="total">✅ Completed! ' + data.successful + '/' + data.total + ' successful</span>';
          html += '<div class="stats-mini">';
          html += '<span class="ok">✅ ' + data.successful + '</span>';
          html += '<span class="fail">❌ ' + (data.total - data.successful) + '</span>';
          html += '</div></div>';

          html += '<div class="result-list">';

          for (var i = 0; i < data.results.length; i++) {
            var r = data.results[i];
            if (r.success) success++;
            else fail++;
            html += '<div class="result-item" data-ip="' + r.ip + '" data-success="' + r.success + '">';
            html += '<span class="ip">' + r.ip + '</span>';
            html += '<span class="status ' + (r.success ? 'success' : 'fail') + '">' + (r.success ? '✅ Adopted' : '❌ Failed') + '</span>';
            if (r.error) html += '<span class="error-msg">' + r.error + '</span>';
            if (!r.success) html += '<button class="retry-btn" onclick="window.retryAp(\'' + r.ip + '\')">🔄 Retry</button>';
            html += '</div>';
          }

          html += '</div>';
          resultDiv.innerHTML = html;

          // Update filter counts
          var btns = document.querySelectorAll('.filter-btn');
          for (var j = 0; j < btns.length; j++) {
            var btn = btns[j];
            if (btn.getAttribute('data-filter') === 'success') {
              btn.textContent = '✅ Success (' + success + ')';
            }
            if (btn.getAttribute('data-filter') === 'failed') {
              btn.textContent = '❌ Failed (' + fail + ')';
            }
          }

          setStats(data.total, data.successful, data.total - data.successful);
          showProgress('✅ Complete! ' + data.successful + '/' + data.total + ' successful', false);

          try {
            tg.sendData(JSON.stringify({ total: data.total, successful: data.successful, failed: data.total - data.successful }));
          } catch(e) {}
        })
        .catch(function(err) {
          resultDiv.innerHTML = '<div style="padding:20px;color:#ef5350;">❌ Error: ' + err.message + '</div>';
          showProgress('❌ Error: ' + err.message, false);
          setStats(ips.length, 0, ips.length);
        })
        .finally(function() {
          adoptBtn.disabled = false;
          adoptBtn.innerHTML = '🚀 Adopt All APs';
        });
      }

      // ============================================
      // EXPOSE FUNCTIONS TO GLOBAL SCOPE
      // ============================================
      window.filterList = filterList;
      window.retryAp = retryAp;
      window.startAdoption = startAdoption;
      window.clearAll = clearAll;
      window.loadSample = loadSample;

      // ============================================
      // EVENTS
      // ============================================
      adoptBtn.addEventListener('click', startAdoption);
      clearBtn.addEventListener('click', clearAll);
      sampleBtn.addEventListener('click', loadSample);

      statAll.addEventListener('click', function() { filterList('all'); });
      statSuccess.addEventListener('click', function() { filterList('success'); });
      statFailed.addEventListener('click', function() { filterList('failed'); });

      ipsTextarea.addEventListener('input', function() {
        var ips = getIPs();
        ipCount.textContent = ips.length + ' IPs';
        totalCount.textContent = ips.length;
        successCount.textContent = '—';
        failCount.textContent = '—';
      });

      ipsTextarea.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
          e.preventDefault();
          startAdoption();
        }
      });

      // ============================================
      // INIT
      // ============================================
      var initEvent = new Event('input');
      ipsTextarea.dispatchEvent(initEvent);

      console.log('✅ UniFi Bulk AP Adopter loaded!');

    })();
  </script>
</body>
</html>
