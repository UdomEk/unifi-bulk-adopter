<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>UniFi Bulk AP Adopter</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 16px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-bottom: 80px;
    }

    .container {
      max-width: 640px;
      width: 100%;
      margin: 0 auto;
    }

    .card {
      background: linear-gradient(145deg, #14141e, #1a1a2e);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .header-logo {
      width: 52px;
      height: 52px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0068b5, #004a8a);
      border-radius: 14px;
      box-shadow: 0 4px 20px rgba(0, 104, 181, 0.3);
      overflow: hidden;
      padding: 6px;
    }

    .header-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 8px;
    }

    .header-title {
      flex: 1;
    }

    .header-title h1 {
      font-size: 22px;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.2;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
    }

    .header-title h1 .unifi-text {
      color: #ffffff;
    }

    .header-title .subtitle {
      font-size: 13px;
      color: #ffffff;
      margin-top: 2px;
      opacity: 0.8;
      line-height: 1.3;
    }

    .badge {
      display: inline-block;
      background: rgba(255, 255, 255, 0.15);
      color: #ffffff;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: 20px;
    }

    /* ===== FAST & EASY BADGE ===== */
    .speed-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(135deg, #ff6b00, #e65100);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 14px;
      border-radius: 20px;
      margin-left: 4px;
      animation: pulse-glow 2s ease-in-out infinite;
      box-shadow: 0 0 20px rgba(255, 107, 0, 0.25);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .speed-badge .lightning {
      font-size: 14px;
      animation: flash 1.5s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 20px rgba(255, 107, 0, 0.25); }
      50% { box-shadow: 0 0 40px rgba(255, 107, 0, 0.5); }
    }

    @keyframes flash {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(1.2); }
    }

    /* ===== FEATURE HIGHLIGHTS ===== */
    .features {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 20px;
    }

    .feature-item {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 10px;
      padding: 10px 8px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.04);
      transition: all 0.3s ease;
    }

    .feature-item:hover {
      background: rgba(255, 255, 255, 0.06);
      transform: translateY(-2px);
    }

    .feature-item .icon {
      font-size: 18px;
      display: block;
      margin-bottom: 2px;
    }

    .feature-item .label {
      font-size: 9px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-item {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 12px;
      padding: 12px 16px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.04);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .stat-item:hover {
      background: rgba(255, 255, 255, 0.08);
      transform: translateY(-2px);
    }

    .stat-item .hint {
      font-size: 9px;
      color: #666;
      margin-top: 4px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .stat-item:hover .hint {
      opacity: 1;
    }

    .stat-number {
      font-size: 24px;
      font-weight: 700;
      color: #ffffff;
    }

    .stat-number.green { color: #4CAF50; }
    .stat-number.red { color: #ef5350; }
    .stat-number.unifi-blue { color: #ffffff; }

    .stat-label {
      font-size: 11px;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 2px;
      opacity: 0.8;
    }

    .textarea-wrapper {
      position: relative;
      margin-bottom: 16px;
    }

    .textarea-wrapper label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 8px;
      opacity: 0.9;
    }

    .textarea-wrapper textarea {
      width: 100%;
      min-height: 200px;
      background: #0d0d18;
      color: #b0ffb0;
      padding: 16px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      line-height: 1.7;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 14px;
      resize: vertical;
      outline: none;
    }

    .textarea-wrapper textarea:focus {
      border-color: #0068b5;
      box-shadow: 0 0 0 3px rgba(0, 104, 181, 0.1);
    }

    .char-count {
      position: absolute;
      bottom: 12px;
      right: 14px;
      font-size: 11px;
      color: #666;
      background: rgba(0, 0, 0, 0.6);
      padding: 2px 10px;
      border-radius: 10px;
      pointer-events: none;
    }

    .btn-group {
      display: flex;
      gap: 10px;
      margin: 8px 0 20px 0;
      flex-wrap: wrap;
    }

    .btn {
      flex: 1;
      min-width: 100px;
      padding: 14px 20px;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.04);
      color: #aaa;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .btn-primary {
      background: linear-gradient(135deg, #0068b5, #004a8a);
      color: #fff;
      border: none;
      box-shadow: 0 4px 20px rgba(0, 104, 181, 0.3);
      flex: 2;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0, 104, 181, 0.4);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.04);
      color: #aaa;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #progress {
      padding: 14px 18px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.03);
      margin: 12px 0 16px 0;
      font-size: 14px;
      font-weight: 500;
      color: #aaa;
      display: none;
      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    #progress.active {
      display: block;
    }

    #result {
      margin-top: 16px;
    }

    .result-summary {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 18px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 12px;
      margin-bottom: 14px;
      border: 1px solid rgba(255, 255, 255, 0.04);
      flex-wrap: wrap;
      gap: 10px;
    }

    .result-summary .total {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
    }

    .result-summary .stats-mini {
      display: flex;
      gap: 16px;
      font-size: 13px;
    }

    .result-summary .stats-mini .ok { color: #4CAF50; }
    .result-summary .stats-mini .fail { color: #ef5350; }

    .filter-buttons {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 6px 16px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 20px;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.03);
      color: #888;
      transition: all 0.2s;
    }

    .filter-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
    }

    .filter-btn.active {
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
      border-color: rgba(255, 255, 255, 0.2);
    }

    .filter-btn.active-success {
      background: rgba(76, 175, 80, 0.2);
      color: #4CAF50;
      border-color: rgba(76, 175, 80, 0.3);
    }

    .filter-btn.active-failed {
      background: rgba(239, 83, 80, 0.2);
      color: #ef5350;
      border-color: rgba(239, 83, 80, 0.3);
    }

    .result-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 300px;
      overflow-y: auto;
    }

    .result-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.02);
      border-radius: 10px;
      font-size: 13px;
      border: 1px solid rgba(255, 255, 255, 0.03);
      transition: all 0.3s ease;
    }

    .result-item:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .result-item .ip {
      font-family: 'Courier New', monospace;
      font-weight: 500;
      color: #ddd;
      min-width: 110px;
    }

    .result-item .status {
      font-weight: 500;
      font-size: 12px;
      padding: 2px 10px;
      border-radius: 20px;
      margin-left: auto;
      flex-shrink: 0;
    }

    .result-item .status.success {
      background: rgba(76, 175, 80, 0.12);
      color: #4CAF50;
    }

    .result-item .status.fail {
      background: rgba(239, 83, 80, 0.12);
      color: #ef5350;
    }

    .result-item .error-msg {
      color: #888;
      font-size: 12px;
      margin-left: 8px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 120px;
    }

    .result-item .retry-btn {
      padding: 3px 12px;
      font-size: 11px;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: rgba(0, 104, 181, 0.15);
      color: #0068b5;
      transition: all 0.25s ease;
      flex-shrink: 0;
    }

    .result-item .retry-btn:hover {
      background: rgba(0, 104, 181, 0.3);
    }

    .result-item.hidden {
      display: none;
    }

    .no-results {
      text-align: center;
      color: #666;
      padding: 30px 0;
      font-size: 14px;
    }

    .footer {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: #444;
    }

    .footer .brand {
      color: #0068b5;
      font-weight: 500;
    }

    .footer .brand span {
      color: #666;
      font-weight: 400;
    }

    @media (max-width: 500px) {
      body { padding: 12px; }
      .card { padding: 20px; }
      .header-title h1 { font-size: 17px; }
      .header-title .subtitle { font-size: 12px; }
      .header-logo { width: 40px; height: 40px; padding: 4px; }
      .speed-badge { font-size: 9px; padding: 3px 10px; }
      .speed-badge .lightning { font-size: 11px; }
      .features { grid-template-columns: repeat(3, 1fr); gap: 6px; }
      .feature-item { padding: 8px 4px; }
      .feature-item .icon { font-size: 15px; }
      .feature-item .label { font-size: 8px; }
      .stats { grid-template-columns: repeat(3, 1fr); gap: 8px; }
      .stat-item { padding: 8px 10px; }
      .stat-number { font-size: 18px; }
      .stat-item .hint { display: none; }
      .btn-group { flex-direction: column; }
      .btn { min-width: unset; }
      .btn-primary { flex: 1; }
      .result-summary { flex-direction: column; gap: 8px; align-items: flex-start; }
      .footer { flex-direction: column; gap: 6px; text-align: center; }
      .textarea-wrapper textarea { min-height: 150px; }
      .filter-buttons { gap: 6px; }
      .filter-btn { font-size: 10px; padding: 4px 10px; }
      .result-item .error-msg { max-width: 60px; }
      .badge { font-size: 9px; padding: 1px 8px; }
    }

    @media (max-width: 380px) {
      .header-logo { width: 34px; height: 34px; padding: 3px; }
      .header-title h1 { font-size: 14px; }
      .header-title .subtitle { font-size: 10px; }
      .speed-badge { font-size: 8px; padding: 2px 8px; }
      .speed-badge .lightning { font-size: 10px; }
      .stat-number { font-size: 15px; }
      .stat-label { font-size: 9px; }
      .stat-item { padding: 6px 8px; }
      .feature-item .icon { font-size: 13px; }
      .feature-item .label { font-size: 7px; }
    }

    .result-list::-webkit-scrollbar {
      width: 4px;
    }
    .result-list::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.02);
      border-radius: 10px;
    }
    .result-list::-webkit-scrollbar-thumb {
      background: rgba(0, 104, 181, 0.3);
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">

      <!-- HEADER with Logo & Speed Badge -->
      <div class="header">
        <div class="header-logo">
          <img src="https://raw.githubusercontent.com/ekmagazine/unifi-bulk-adopter/main/Logo.png" alt="FOOTPRINTS INTERNATIONAL SCHOOL" onerror="this.style.display='none'">
        </div>
        <div class="header-title">
          <h1>
            <span class="unifi-text">UniFi</span> Bulk AP Adopter
            <span class="badge">v2.0</span>
            <span class="speed-badge">
              <span class="lightning">⚡</span> FAST & EASY
            </span>
          </h1>
          <div class="subtitle">Adopt multiple UniFi Access Points at once via SSH</div>
        </div>
      </div>

      <!-- FEATURE HIGHLIGHTS -->
      <div class="features">
        <div class="feature-item">
          <span class="icon">⚡</span>
          <span class="label">Instant Adoption</span>
        </div>
        <div class="feature-item">
          <span class="icon">📋</span>
          <span class="label">Bulk APs</span>
        </div>
        <div class="feature-item">
          <span class="icon">🔒</span>
          <span class="label">Secure SSH</span>
        </div>
      </div>

      <!-- STATS (Clickable) -->
      <div class="stats" id="stats">
        <div class="stat-item" onclick="filterResults('all')">
          <div class="stat-number unifi-blue" id="totalCount">0</div>
          <div class="stat-label">Total APs</div>
          <div class="hint">▼ show all</div>
        </div>
        <div class="stat-item" onclick="filterResults('success')">
          <div class="stat-number green" id="successCount">0</div>
          <div class="stat-label">Successful</div>
          <div class="hint">▼ show success</div>
        </div>
        <div class="stat-item" onclick="filterResults('failed')">
          <div class="stat-number red" id="failCount">0</div>
          <div class="stat-label">Failed</div>
          <div class="hint">▼ show failed</div>
        </div>
      </div>

      <!-- TEXTAREA -->
      <div class="textarea-wrapper">
        <label>📋 AP IP Addresses <span style="color:#666;font-weight:400;">(one per line)</span></label>
        <textarea id="ips" placeholder="192.168.1.10&#10;192.168.1.11&#10;192.168.1.12"></textarea>
        <span class="char-count" id="ipCount">0 IPs</span>
      </div>

      <!-- BUTTONS -->
      <div class="btn-group">
        <button class="btn btn-primary" id="adoptBtn" onclick="startAdoption()">🚀 Adopt All APs</button>
        <button class="btn btn-secondary" onclick="clearAll()">✕ Clear</button>
        <button class="btn btn-secondary" onclick="loadSample()">📝 Sample</button>
      </div>

      <!-- PROGRESS -->
      <div id="progress"><span id="progressText">⏳ Processing 0 APs...</span></div>

      <!-- RESULTS -->
      <div id="result"></div>

      <!-- FOOTER -->
      <div class="footer">
        <span class="brand">Access Point <span>— UniFi Tool</span></span>
        <span>⚡ <span id="timestamp"></span></span>
      </div>

    </div>
  </div>

  <script>
    // Simple Telegram WebApp
    try {
      const tg = window.Telegram.WebApp;
      tg.ready();
      tg.expand();
    } catch(e) {
      console.log('Telegram WebApp not available');
    }

    // DOM elements
    const ipsTextarea = document.getElementById('ips');
    const adoptBtn = document.getElementById('adoptBtn');
    const progress = document.getElementById('progress');
    const progressText = document.getElementById('progressText');
    const resultDiv = document.getElementById('result');
    const totalCount = document.getElementById('totalCount');
    const successCount = document.getElementById('successCount');
    const failCount = document.getElementById('failCount');
    const ipCount = document.getElementById('ipCount');
    const timestamp = document.getElementById('timestamp');

    // Live IP count
    ipsTextarea.addEventListener('input', function() {
      const ips = getIPs();
      ipCount.textContent = ips.length + ' IPs';
      totalCount.textContent = ips.length;
      successCount.textContent = '—';
      failCount.textContent = '—';
    });

    function getIPs() {
      return ipsTextarea.value.split('\n').map(i => i.trim()).filter(Boolean);
    }

    function getIPsWithComments() {
      return ipsTextarea.value.split('\n').map(i => i.trim()).filter(Boolean).filter(i => !i.startsWith('#'));
    }

    function setStats(total, success, fail) {
      totalCount.textContent = total;
      successCount.textContent = success;
      failCount.textContent = fail;
    }

    function showProgress(text, show) {
      progress.className = show ? 'active' : '';
      progressText.textContent = text;
    }

    function setTimestamp() {
      timestamp.textContent = new Date().toLocaleTimeString();
    }
    setTimestamp();
    setInterval(setTimestamp, 30000);

    function clearAll() {
      ipsTextarea.value = '';
      resultDiv.innerHTML = '';
      showProgress('', false);
      ipCount.textContent = '0 IPs';
      totalCount.textContent = '0';
      successCount.textContent = '—';
      failCount.textContent = '—';
      adoptBtn.disabled = false;
      adoptBtn.innerHTML = '🚀 Adopt All APs';
    }

    function loadSample() {
      ipsTextarea.value = '192.168.1.10\n192.168.1.11\n192.168.1.12\n192.168.1.13\n192.168.1.14';
      ipsTextarea.dispatchEvent(new Event('input'));
    }

    // ============================================
    // FILTER FUNCTION
    // ============================================
    function filterResults(filter) {
      var items = document.querySelectorAll('.result-item');
      var visibleCount = 0;

      for (var i = 0; i < items.length; i++) {
        var item = items[i];
        var isSuccess = item.getAttribute('data-success') === 'true';
        var show = false;

        if (filter === 'all') show = true;
        else if (filter === 'success') show = isSuccess;
        else if (filter === 'failed') show = !isSuccess;

        if (show) {
          item.classList.remove('hidden');
          visibleCount++;
        } else {
          item.classList.add('hidden');
        }
      }

      // Update filter buttons
      var btns = document.querySelectorAll('.filter-btn');
      for (var j = 0; j < btns.length; j++) {
        var btn = btns[j];
        btn.className = 'filter-btn';
        if (btn.getAttribute('data-filter') === filter) {
          btn.classList.add('active-' + filter);
        }
      }

      // Show/hide no results message
      var noResults = document.querySelector('.no-results');
      if (noResults) {
        if (visibleCount === 0 && items.length > 0) {
          noResults.style.display = 'block';
        } else {
          noResults.style.display = 'none';
        }
      }
    }

    // ============================================
    // RETRY FUNCTION
    // ============================================
    function retryAp(ip) {
      if (!confirm('Retry adopting ' + ip + '?')) return;

      var btn = document.querySelector('.result-item[data-ip="' + ip + '"] .retry-btn');
      if (btn) {
        btn.textContent = '⏳';
        btn.disabled = true;
      }

      fetch('https://unifi-bulk-adopter-production.up.railway.app/adopt-bulk', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ips: [ip] })
      })
      .then(function(res) { return res.json(); })
      .then(function(data) {
        var result = data.results[0];
        var item = document.querySelector('.result-item[data-ip="' + ip + '"]');
        if (item) {
          if (result.success) {
            item.setAttribute('data-success', 'true');
            var statusEl = item.querySelector('.status');
            statusEl.className = 'status success';
            statusEl.textContent = '✅ Adopted';
            var err = item.querySelector('.error-msg');
            if (err) err.remove();
            var retry = item.querySelector('.retry-btn');
            if (retry) retry.remove();
          } else {
            var errMsg = item.querySelector('.error-msg');
            if (!errMsg) {
              errMsg = document.createElement('span');
              errMsg.className = 'error-msg';
              item.appendChild(errMsg);
            }
            errMsg.textContent = result.error || 'Retry failed';
          }
        }

        var success = document.querySelectorAll('.result-item[data-success="true"]').length;
        var failed = document.querySelectorAll('.result-item[data-success="false"]').length;
        setStats(success + failed, success, failed);

        filterResults('all');
      })
      .catch(function(err) {
        alert('Error retrying: ' + err.message);
      });
    }

    // ============================================
    // MAIN ADOPT FUNCTION
    // ============================================
    async function startAdoption() {
      const ips = getIPsWithComments();

      if (ips.length === 0) {
        alert('Please paste at least one IP address.');
        return;
      }

      if (!confirm('Adopt ' + ips.length + ' AP(s)?')) return;

      adoptBtn.disabled = true;
      adoptBtn.innerHTML = '<span class="spinner"></span> Adopting...';
      resultDiv.innerHTML = '';
      showProgress('⏳ Processing ' + ips.length + ' APs...', true);
      setStats(ips.length, '…', '…');

      try {
        const response = await fetch('https://unifi-bulk-adopter-production.up.railway.app/adopt-bulk', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ips: ips })
        });

        const data = await response.json();

        let success = 0;
        let fail = 0;

        // Build filter buttons
        let html = '';
        html += '<div class="filter-buttons">';
        html += '<button class="filter-btn active-all" data-filter="all" onclick="filterResults(\'all\')">📊 All (' + data.total + ')</button>';
        html += '<button class="filter-btn" data-filter="success" onclick="filterResults(\'success\')">✅ Success (0)</button>';
        html += '<button class="filter-btn" data-filter="failed" onclick="filterResults(\'failed\')">❌ Failed (0)</button>';
        html += '</div>';

        html += '<div class="result-summary">';
        html += '<span class="total">✅ Completed! ' + data.successful + '/' + data.total + ' successful</span>';
        html += '<div class="stats-mini">';
        html += '<span class="ok">✅ ' + data.successful + '</span>';
        html += '<span class="fail">❌ ' + (data.total - data.successful) + '</span>';
        html += '</div></div>';

        html += '<div class="result-list">';

        for (var i = 0; i < data.results.length; i++) {
          var r = data.results[i];
          if (r.success) success++;
          else fail++;
          html += '<div class="result-item" data-ip="' + r.ip + '" data-success="' + r.success + '">';
          html += '<span class="ip">' + r.ip + '</span>';
          html += '<span class="status ' + (r.success ? 'success' : 'fail') + '">' + (r.success ? '✅ Adopted' : '❌ Failed') + '</span>';
          if (r.error) html += '<span class="error-msg">' + r.error + '</span>';
          if (!r.success) html += '<button class="retry-btn" onclick="retryAp(\'' + r.ip + '\')">🔄 Retry</button>';
          html += '</div>';
        }

        html += '</div>';
        resultDiv.innerHTML = html;

        // Update filter counts
        var btns = document.querySelectorAll('.filter-btn');
        for (var j = 0; j < btns.length; j++) {
          var btn = btns[j];
          if (btn.getAttribute('data-filter') === 'success') {
            btn.textContent = '✅ Success (' + success + ')';
          }
          if (btn.getAttribute('data-filter') === 'failed') {
            btn.textContent = '❌ Failed (' + fail + ')';
          }
        }

        setStats(data.total, data.successful, data.total - data.successful);
        showProgress('✅ Complete! ' + data.successful + '/' + data.total + ' successful', false);

        try {
          tg.sendData(JSON.stringify({ total: data.total, successful: data.successful, failed: data.total - data.successful }));
        } catch(e) {}

      } catch(err) {
        resultDiv.innerHTML = '<div class="result-item" style="border-color: rgba(239,83,80,0.2);"><span style="color:#ef5350;">❌ Error: ' + err.message + '</span></div>';
        showProgress('❌ Error: ' + err.message, false);
        setStats(ips.length, 0, ips.length);
      }

      adoptBtn.disabled = false;
      adoptBtn.innerHTML = '🚀 Adopt All APs';
    }

    // Init
    ipsTextarea.dispatchEvent(new Event('input'));

    // Keyboard shortcut
    ipsTextarea.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        startAdoption();
      }
    });

    console.log('✅ UniFi Bulk AP Adopter loaded successfully!');
  </script>
</body>
</html>
