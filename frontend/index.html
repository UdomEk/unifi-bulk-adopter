<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>UniFi Bulk AP Adopter</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 16px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-bottom: 80px;
    }

    .container {
      max-width: 640px;
      width: 100%;
      margin: 0 auto;
    }

    .card {
      background: linear-gradient(145deg, #14141e, #1a1a2e);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .header-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #4CAF50, #2e7d32);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 700;
      color: #ffffff;
    }

    .header .subtitle {
      font-size: 14px;
      color: #8888aa;
      margin-top: 2px;
    }

    .badge {
      display: inline-block;
      background: rgba(76, 175, 80, 0.15);
      color: #4CAF50;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: 20px;
      margin-left: 8px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-item {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 12px;
      padding: 12px 16px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    .stat-number {
      font-size: 24px;
      font-weight: 700;
      color: #ffffff;
    }

    .stat-number.green { color: #4CAF50; }
    .stat-number.red { color: #ef5350; }

    .stat-label {
      font-size: 11px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 2px;
    }

    .textarea-wrapper {
      position: relative;
      margin-bottom: 16px;
    }

    .textarea-wrapper label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #aaa;
      margin-bottom: 8px;
    }

    .textarea-wrapper textarea {
      width: 100%;
      min-height: 200px;
      background: #0d0d18;
      color: #b0ffb0;
      padding: 16px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      line-height: 1.7;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 14px;
      resize: vertical;
      outline: none;
    }

    .textarea-wrapper textarea:focus {
      border-color: #4CAF50;
    }

    .char-count {
      position: absolute;
      bottom: 12px;
      right: 14px;
      font-size: 11px;
      color: #444;
      background: rgba(0, 0, 0, 0.6);
      padding: 2px 10px;
      border-radius: 10px;
      pointer-events: none;
    }

    .btn-group {
      display: flex;
      gap: 10px;
      margin: 8px 0 20px 0;
      flex-wrap: wrap;
    }

    .btn {
      flex: 1;
      min-width: 100px;
      padding: 14px 20px;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.04);
      color: #aaa;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .btn-primary {
      background: linear-gradient(135deg, #4CAF50, #2e7d32);
      color: #fff;
      border: none;
      box-shadow: 0 4px 20px rgba(76, 175, 80, 0.25);
      flex: 2;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(76, 175, 80, 0.35);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.04);
      color: #aaa;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #progress {
      padding: 14px 18px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.03);
      margin: 12px 0 16px 0;
      font-size: 14px;
      font-weight: 500;
      color: #aaa;
      display: none;
      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    #progress.active {
      display: block;
    }

    #result {
      margin-top: 16px;
    }

    .result-summary {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 18px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 12px;
      margin-bottom: 14px;
      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    .result-summary .total {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
    }

    .result-summary .stats-mini {
      display: flex;
      gap: 16px;
      font-size: 13px;
    }

    .result-summary .stats-mini .ok { color: #4CAF50; }
    .result-summary .stats-mini .fail { color: #ef5350; }

    .result-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 300px;
      overflow-y: auto;
    }

    .result-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.02);
      border-radius: 10px;
      font-size: 13px;
      border: 1px solid rgba(255, 255, 255, 0.03);
    }

    .result-item .ip {
      font-family: 'Courier New', monospace;
      font-weight: 500;
      color: #ddd;
      min-width: 110px;
    }

    .result-item .status {
      font-weight: 500;
      font-size: 12px;
      padding: 2px 10px;
      border-radius: 20px;
      margin-left: auto;
      flex-shrink: 0;
    }

    .result-item .status.success {
      background: rgba(76, 175, 80, 0.12);
      color: #4CAF50;
    }

    .result-item .status.fail {
      background: rgba(239, 83, 80, 0.12);
      color: #ef5350;
    }

    .result-item .error-msg {
      color: #888;
      font-size: 12px;
      margin-left: 8px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 120px;
    }

    .footer {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: #444;
    }

    .footer .brand {
      color: #4CAF50;
      font-weight: 500;
    }

    .footer .brand span {
      color: #666;
      font-weight: 400;
    }

    @media (max-width: 500px) {
      body { padding: 12px; }
      .card { padding: 20px; }
      .header h1 { font-size: 18px; }
      .stats { grid-template-columns: repeat(3, 1fr); gap: 8px; }
      .stat-item { padding: 8px 10px; }
      .stat-number { font-size: 18px; }
      .btn-group { flex-direction: column; }
      .btn { min-width: unset; }
      .btn-primary { flex: 1; }
      .result-summary { flex-direction: column; gap: 8px; align-items: flex-start; }
      .footer { flex-direction: column; gap: 6px; text-align: center; }
      .textarea-wrapper textarea { min-height: 150px; }
    }

    /* Scrollbar styling */
    .result-list::-webkit-scrollbar {
      width: 4px;
    }
    .result-list::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.02);
      border-radius: 10px;
    }
    .result-list::-webkit-scrollbar-thumb {
      background: rgba(76, 175, 80, 0.3);
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">

      <!-- HEADER -->
      <div class="header">
        <div class="header-icon">📡</div>
        <div>
          <h1>UniFi Bulk AP Adopter <span class="badge">v2.0</span></h1>
          <div class="subtitle">Adopt multiple UniFi Access Points at once via SSH</div>
        </div>
      </div>

      <!-- STATS -->
      <div class="stats" id="stats">
        <div class="stat-item">
          <div class="stat-number" id="totalCount">0</div>
          <div class="stat-label">Total APs</div>
        </div>
        <div class="stat-item">
          <div class="stat-number green" id="successCount">0</div>
          <div class="stat-label">Successful</div>
        </div>
        <div class="stat-item">
          <div class="stat-number red" id="failCount">0</div>
          <div class="stat-label">Failed</div>
        </div>
      </div>

      <!-- TEXTAREA -->
      <div class="textarea-wrapper">
        <label>📋 AP IP Addresses <span style="color:#666;font-weight:400;">(one per line)</span></label>
        <textarea id="ips" placeholder="192.168.1.10&#10;192.168.1.11&#10;192.168.1.12"></textarea>
        <span class="char-count" id="ipCount">0 IPs</span>
      </div>

      <!-- BUTTONS -->
      <div class="btn-group">
        <button class="btn btn-primary" id="adoptBtn" onclick="startAdoption()">🚀 Adopt All APs</button>
        <button class="btn btn-secondary" onclick="clearAll()">✕ Clear</button>
        <button class="btn btn-secondary" onclick="loadSample()">📝 Sample</button>
      </div>

      <!-- PROGRESS -->
      <div id="progress"><span id="progressText">⏳ Processing 0 APs...</span></div>

      <!-- RESULTS -->
      <div id="result"></div>

      <!-- FOOTER -->
      <div class="footer">
        <span class="brand">🏫 FOOTPRINTS <span>INTERNATIONAL SCHOOL</span></span>
        <span>⚡ <span id="timestamp"></span></span>
      </div>

    </div>
  </div>

  <script>
    // Simple Telegram WebApp
    try {
      const tg = window.Telegram.WebApp;
      tg.ready();
      tg.expand();
    } catch(e) {
      console.log('Telegram WebApp not available');
    }

    // DOM elements
    const ipsTextarea = document.getElementById('ips');
    const adoptBtn = document.getElementById('adoptBtn');
    const progress = document.getElementById('progress');
    const progressText = document.getElementById('progressText');
    const resultDiv = document.getElementById('result');
    const totalCount = document.getElementById('totalCount');
    const successCount = document.getElementById('successCount');
    const failCount = document.getElementById('failCount');
    const ipCount = document.getElementById('ipCount');
    const timestamp = document.getElementById('timestamp');

    // Live IP count
    ipsTextarea.addEventListener('input', function() {
      const ips = getIPs();
      ipCount.textContent = ips.length + ' IPs';
      totalCount.textContent = ips.length;
      successCount.textContent = '—';
      failCount.textContent = '—';
    });

    function getIPs() {
      return ipsTextarea.value.split('\n').map(i => i.trim()).filter(Boolean);
    }

    function getIPsWithComments() {
      return ipsTextarea.value.split('\n').map(i => i.trim()).filter(Boolean).filter(i => !i.startsWith('#'));
    }

    function setStats(total, success, fail) {
      totalCount.textContent = total;
      successCount.textContent = success;
      failCount.textContent = fail;
    }

    function showProgress(text, show) {
      progress.className = show ? 'active' : '';
      progressText.textContent = text;
    }

    function setTimestamp() {
      timestamp.textContent = new Date().toLocaleTimeString();
    }
    setTimestamp();
    setInterval(setTimestamp, 30000);

    function clearAll() {
      ipsTextarea.value = '';
      resultDiv.innerHTML = '';
      showProgress('', false);
      ipCount.textContent = '0 IPs';
      totalCount.textContent = '0';
      successCount.textContent = '—';
      failCount.textContent = '—';
      adoptBtn.disabled = false;
      adoptBtn.innerHTML = '🚀 Adopt All APs';
    }

    function loadSample() {
      ipsTextarea.value = '192.168.1.10\n192.168.1.11\n192.168.1.12\n192.168.1.13\n192.168.1.14';
      ipsTextarea.dispatchEvent(new Event('input'));
    }

    async function startAdoption() {
      const ips = getIPsWithComments();

      if (ips.length === 0) {
        alert('Please paste at least one IP address.');
        return;
      }

      if (!confirm('Adopt ' + ips.length + ' AP(s)?')) return;

      adoptBtn.disabled = true;
      adoptBtn.innerHTML = '<span class="spinner"></span> Adopting...';
      resultDiv.innerHTML = '';
      showProgress('⏳ Processing ' + ips.length + ' APs...', true);
      setStats(ips.length, '…', '…');

      try {
        const response = await fetch('https://unifi-bulk-adopter-production.up.railway.app/adopt-bulk', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ips: ips })
        });

        const data = await response.json();

        let success = 0;
        let fail = 0;
        let html = '<div class="result-summary"><span class="total">✅ Completed! ' + data.successful + '/' + data.total + ' successful</span><div class="stats-mini"><span class="ok">✅ ' + data.successful + '</span><span class="fail">❌ ' + (data.total - data.successful) + '</span></div></div><div class="result-list">';

        data.results.forEach(function(r) {
          if (r.success) success++;
          else fail++;
          html += '<div class="result-item"><span class="ip">' + r.ip + '</span><span class="status ' + (r.success ? 'success' : 'fail') + '">' + (r.success ? '✅ Adopted' : '❌ Failed') + '</span>' + (r.error ? '<span class="error-msg">' + r.error + '</span>' : '') + '</div>';
        });

        html += '</div>';
        resultDiv.innerHTML = html;

        setStats(data.total, data.successful, data.total - data.successful);
        showProgress('✅ Complete! ' + data.successful + '/' + data.total + ' successful', false);

        try {
          tg.sendData(JSON.stringify({ total: data.total, successful: data.successful, failed: data.total - data.successful }));
        } catch(e) {}

      } catch(err) {
        resultDiv.innerHTML = '<div class="result-item" style="border-color: rgba(239,83,80,0.2);"><span style="color:#ef5350;">❌ Error: ' + err.message + '</span></div>';
        showProgress('❌ Error: ' + err.message, false);
        setStats(ips.length, 0, ips.length);
      }

      adoptBtn.disabled = false;
      adoptBtn.innerHTML = '🚀 Adopt All APs';
    }

    // Init
    ipsTextarea.dispatchEvent(new Event('input'));

    // Keyboard shortcut
    ipsTextarea.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        startAdoption();
      }
    });

    console.log('✅ UniFi Bulk AP Adopter loaded successfully!');
  </script>
</body>
</html>
