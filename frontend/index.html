    // ============================================
    // SUPABASE API FUNCTIONS
    // ============================================
    async function supabaseFetch(endpoint, options = {}) {
      const url = `${SUPABASE_URL}/rest/v1/${endpoint}`;
      const headers = {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation'
      };
      
      const response = await fetch(url, {
        ...options,
        headers: { ...headers, ...options.headers }
      });
      
      if (!response.ok) {
        throw new Error(`Supabase error: ${response.status}`);
      }
      
      return response.json();
    }

    // ============================================
    // LOAD USERS FROM SUPABASE
    // ============================================
    async function loadUsersFromSupabase() {
      try {
        const data = await supabaseFetch('users?select=*');
        if (data.length === 0) {
          // Create default Super Admin
          await supabaseFetch('users', {
            method: 'POST',
            body: JSON.stringify({
              id: 'super-admin-1',
              name: 'Udom Ek',
              telegram: '@udomek',
              role: 'super-admin',
              pin: '1234',
              needsPinChange: false
            })
          });
          return [{
            id: 'super-admin-1',
            name: 'Udom Ek',
            telegram: '@UdomEk',
            role: 'super-admin',
            pin: '1234',
            needsPinChange: false
          }];
        }
        return data;
      } catch (error) {
        console.error('Error loading users from Supabase:', error);
        return loadUsersFromLocalStorage();
      }
    }

    // ============================================
    // SAVE USERS TO SUPABASE
    // ============================================
    async function saveUsersToSupabase(users) {
      try {
        // Delete all existing users (except Super Admin)
        await supabaseFetch('users?role=neq.super-admin', {
          method: 'DELETE'
        });
        
        // Insert all users (except Super Admin)
        const usersToInsert = users.filter(u => u.role !== 'super-admin');
        if (usersToInsert.length > 0) {
          await supabaseFetch('users', {
            method: 'POST',
            body: JSON.stringify(usersToInsert)
          });
        }
      } catch (error) {
        console.error('Error saving users to Supabase:', error);
      }
    }

    // ============================================
    // LOCAL STORAGE FALLBACK
    // ============================================
    function loadUsersFromLocalStorage() {
      try {
        const saved = localStorage.getItem('unifi_users');
        if (saved) {
          const users = JSON.parse(saved);
          if (!users.find(u => u.id === 'super-admin-1')) {
            users.push({
              id: 'super-admin-1',
              name: 'Udom Ek',
              telegram: '@udomek',
              role: 'super-admin',
              pin: '1234',
              needsPinChange: false
            });
          }
          return users;
        }
      } catch(e) {}
      return [{
        id: 'super-admin-1',
        name: 'Udom Ek',
        telegram: '@udomek',
        role: 'super-admin',
        pin: '1234',
        needsPinChange: false
      }];
    }

    function saveUsersToLocalStorage(users) {
      localStorage.setItem('unifi_users', JSON.stringify(users));
    }

    // ============================================
    // STATE
    // ============================================
    let currentUser = null;
    let selectedUserId = null;
    let pinBuffer = '';
    let changePinBuffer = '';
    let users = [];
    let currentFilter = 'all';
    let pendingUser = null;

    // ============================================
    // RENDER FUNCTIONS
    // ============================================
    function renderUserSelector() {
      const container = document.getElementById('userSelector');
      if (!container) return;

      const visibleUsers = users;

      if (visibleUsers.length === 0) {
        container.innerHTML = '<div style="text-align:center;color:#666;padding:20px;">No users found</div>';
        return;
      }

      let html = '';
      visibleUsers.forEach(function(user) {
        const isSuperAdmin = user.role === 'super-admin';
        const initials = user.name.charAt(0).toUpperCase();
        const telegramDisplay = user.telegram ? user.telegram : '';
        const isActive = selectedUserId === user.id;

        html += `
          <div class="user-option ${isActive ? 'active' : ''}" onclick="selectUser('${user.id}')">
            <div class="avatar">${initials}</div>
            <div class="info">
              <div>
                <span class="name">${user.name}</span>
                <span class="role-tag ${user.role}">${isSuperAdmin ? '👑 Super Admin' : '👤 Admin'}</span>
              </div>
              ${telegramDisplay ? `<div class="telegram">${telegramDisplay}</div>` : ''}
            </div>
            <div class="check">✓</div>
          </div>
        `;
      });
      container.innerHTML = html;

      if (visibleUsers.length === 1) {
        selectUser(visibleUsers[0].id);
      }

      updateSelectedUserDisplay();
    }

    function selectUser(userId) {
      selectedUserId = userId;
      renderUserSelector();
      pinBuffer = '';
      updatePinDots();
      document.getElementById('pinError').textContent = '';
      document.getElementById('pinSuccess').textContent = '';
      updateSelectedUserDisplay();
    }

    function updateSelectedUserDisplay() {
      const display = document.getElementById('selectedUserDisplay');
      if (!display) return;
      if (selectedUserId) {
        const user = users.find(u => u.id === selectedUserId);
        if (user) {
          display.textContent = '👤 Selected: ' + user.name + (user.telegram ? ' (' + user.telegram + ')' : '');
          display.style.color = '#0068b5';
        }
      } else {
        display.textContent = '👆 Please select a user';
        display.style.color = '#888';
      }
    }

    function renderLoginUserList() {
      const container = document.getElementById('loginUserList');
      if (!container) return;
      if (users.length === 0) {
        container.innerHTML = '<div style="color:#666;font-size:13px;">No users registered</div>';
        return;
      }
      let html = '';
      users.forEach(function(user) {
        const isSuperAdmin = user.role === 'super-admin';
        const telegramDisplay = user.telegram ? user.telegram : '';
        html += `
          <div class="user-item-display">
            <span>${user.name} ${telegramDisplay ? '(' + telegramDisplay + ')' : ''}</span>
            <span class="role-badge ${user.role}">${isSuperAdmin ? '👑 Super Admin' : '👤 Admin'}</span>
          </div>
        `;
      });
      container.innerHTML = html;
    }

    function renderUserList() {
      const list = document.getElementById('userList');
      if (!list) return;
      if (users.length === 0) {
        list.innerHTML = '<div style="text-align:center;color:#666;padding:20px;">No users found</div>';
        return;
      }
      let html = '';
      users.forEach(function(user) {
        const isSuperAdmin = user.role === 'super-admin';
        const initials = user.name.charAt(0).toUpperCase();
        const isDefaultSuperAdmin = user.id === 'super-admin-1';
        const telegramDisplay = user.telegram ? user.telegram : '';
        const pinDisplay = user.pin ? 'PIN: ' + user.pin : '';
        const isDefaultPin = user.pin === '0000' || user.pin === '1166';

        html += `
          <div class="user-item ${isSuperAdmin ? 'super-admin-item' : ''}">
            <div class="user-details">
              <div class="avatar">${initials}</div>
              <span class="name">${user.name}</span>
              ${telegramDisplay ? `<span class="telegram-id">${telegramDisplay}</span>` : ''}
              <span class="role-tag ${user.role}">${isSuperAdmin ? '👑 Super Admin' : '👤 Admin'}</span>
              ${isDefaultSuperAdmin ? '<span style="font-size:10px;color:#ff6b00;font-weight:600;">★ Owner</span>' : ''}
              ${isDefaultPin ? '<span style="font-size:10px;color:#ff6b00;font-weight:600;">⚠️ Default PIN</span>' : ''}
              <span style="font-size:10px;color:#666;font-family:monospace;">${pinDisplay}</span>
            </div>
            <div class="user-actions">
              <button class="reset-pin-btn" onclick="resetUserPin('${user.id}')">🔄 Reset PIN</button>
              ${!isDefaultSuperAdmin ? `<button class="remove-btn" onclick="removeUser('${user.id}')">✕</button>` : ''}
            </div>
          </div>
        `;
      });
      list.innerHTML = html;
    }

    // ============================================
    // USER CRUD OPERATIONS (Supabase + Local)
    // ============================================
    async function loadUsers() {
      users = await loadUsersFromSupabase();
      saveUsersToLocalStorage(users);
      renderUserSelector();
      renderUserList();
      renderLoginUserList();
    }

    async function saveUsers() {
      await saveUsersToSupabase(users);
      saveUsersToLocalStorage(users);
    }

    async function addUser() {
      const nameInput = document.getElementById('newUserName');
      const telegramInput = document.getElementById('newUserTelegram');
      const roleSelect = document.getElementById('newUserRole');
      const pinInput = document.getElementById('newUserPin');
      
      const name = nameInput.value.trim();
      const telegram = telegramInput.value.trim();
      const customPin = pinInput.value.trim();
      
      if (!name) {
        showToast('Please enter a username.', 'error');
        return;
      }
      
      if (users.some(u => u.name.toLowerCase() === name.toLowerCase())) {
        showToast('User already exists!', 'error');
        return;
      }
      
      let pin = '0000';
      let needsPinChange = true;
      
      if (customPin) {
        if (!/^\d{4}$/.test(customPin)) {
          showToast('PIN must be exactly 4 digits.', 'error');
          return;
        }
        pin = customPin;
        needsPinChange = false;
      }
      
      const newUser = {
        id: 'user-' + Date.now(),
        name: name,
        telegram: telegram || '',
        role: roleSelect.value,
        pin: pin,
        needsPinChange: needsPinChange
      };

      users.push(newUser);
      await saveUsers();
      
      nameInput.value = '';
      telegramInput.value = '';
      pinInput.value = '';
      
      renderUserSelector();
      renderUserList();
      renderLoginUserList();
      
      showToast('✅ User "' + name + '" added with PIN: ' + pin + (needsPinChange ? ' (must change on first login)' : ''), 'success');
    }

    async function removeUser(userId) {
      if (userId === 'super-admin-1') {
        showToast('Cannot remove the Super Admin.', 'error');
        return;
      }
      const user = users.find(u => u.id === userId);
      if (!user) return;
      if (!confirm('Remove user "' + user.name + '"?')) return;
      
      users = users.filter(u => u.id !== userId);
      await saveUsers();
      
      renderUserSelector();
      renderUserList();
      renderLoginUserList();
      if (selectedUserId === userId) {
        selectedUserId = null;
        updateSelectedUserDisplay();
      }
      showToast('✅ User removed.', 'success');
    }

    async function resetUserPin(userId) {
      const user = users.find(u => u.id === userId);
      if (!user) {
        showToast('User not found!', 'error');
        return;
      }
      if (!confirm('Reset PIN for "' + user.name + '" to 0000?')) return;
      
      user.pin = '0000';
      user.needsPinChange = true;
      await saveUsers();
      
      renderUserSelector();
      renderUserList();
      renderLoginUserList();
      showToast('✅ PIN reset to 0000 for ' + user.name + '. They must change it on next login.', 'success');
    }

    async function resetAllUsers() {
      if (!confirm('Reset all users? Only Super Admin will remain.')) return;
      users = [{
        id: 'super-admin-1',
        name: 'Udom Ek',
        telegram: '@udomek',
        role: 'super-admin',
        pin: '1234',
        needsPinChange: false
      }];
      await saveUsers();
      
      renderUserSelector();
      renderUserList();
      renderLoginUserList();
      selectedUserId = null;
      updateSelectedUserDisplay();
      showToast('✅ All users reset.', 'success');
    }

    async function clearAllData() {
      if (!confirm('⚠️ Clear ALL data including adoption history?')) return;
      users = [{

      renderUserSelector();

      updateSelectedUserDisplay();
      document.getElementById('result').innerHTML = '';
      showToast('✅ All data cleared.', 'success');

    // ============================================
    // PIN LOGIN
    // ============================================
    function pinInput(num) {
      const error = document.getElementById('pinError');
      const success = document.getElementById('pinSuccess');
      error.textContent = '';
      success.textContent = '';
      
      if (!selectedUserId) {
        error.textContent = '⚠️ Please select a user first.';
        return;
      }
      
      if (pinBuffer.length >= 4) return;
      pinBuffer += num;
      updatePinDots();
      if (pinBuffer.length === 4) {
        verifyPin();
      }
    }

    function pinDelete() {
      if (pinBuffer.length > 0) {
        pinBuffer = pinBuffer.slice(0, -1);
        updatePinDots();
        document.getElementById('pinError').textContent = '';
      }
    }

    function updatePinDots() {
      for (let i = 1; i <= 4; i++) {
        const dot = document.getElementById('dot' + i);
        if (dot) {
          dot.className = 'pin-dot' + (i <= pinBuffer.length ? ' filled' : '');
        }
      }
    }

    function verifyPin() {
      const error = document.getElementById('pinError');
      const success = document.getElementById('pinSuccess');

      const selectedUser = users.find(u => u.id === selectedUserId);
      
      if (!selectedUser) {
        error.textContent = '⚠️ User not found. Please select a user.';
        pinBuffer = '';
        updatePinDots();
        return;
      }

      if (pinBuffer === selectedUser.pin) {
        success.textContent = '✅ Welcome ' + selectedUser.name + '!';
        currentUser = selectedUser;
        
        const defaultPins = ['0000', '1166'];
        if (defaultPins.includes(selectedUser.pin) || selectedUser.needsPinChange === true) {
          pendingUser = selectedUser;
          setTimeout(function() {
            showChangePinScreen();
          }, 500);
        } else {
          setTimeout(function() {
            loginSuccess();
          }, 300);
        }
      } else {
        error.textContent = '❌ Invalid PIN for ' + selectedUser.name + '. Please try again.';
        pinBuffer = '';
        updatePinDots();
        const display = document.getElementById('pinDisplay');
        display.style.animation = 'shake 0.5s ease';
        setTimeout(function() { display.style.animation = ''; }, 500);
      }
    }

    // ============================================
    // CHANGE PIN SCREEN
    // ============================================
    function showChangePinScreen() {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('changePinScreen').classList.add('active');
      changePinBuffer = '';
      updateChangePinDots();
      document.getElementById('changePinError').textContent = '';
      document.getElementById('changePinSuccess').textContent = '';
    }

    function changePinInput(num) {
      const error = document.getElementById('changePinError');
      const success = document.getElementById('changePinSuccess');
      error.textContent = '';
      success.textContent = '';
      if (changePinBuffer.length >= 4) return;
      changePinBuffer += num;
      updateChangePinDots();
      if (changePinBuffer.length === 4) {
        confirmChangePin();
      }
    }

    function changePinDelete() {
      if (changePinBuffer.length > 0) {
        changePinBuffer = changePinBuffer.slice(0, -1);
        updateChangePinDots();
        document.getElementById('changePinError').textContent = '';
      }
    }

    function updateChangePinDots() {
      for (let i = 1; i <= 4; i++) {
        const dot = document.getElementById('cDot' + i);
        if (dot) {
          dot.className = 'pin-dot' + (i <= changePinBuffer.length ? ' filled' : '');
        }
      }
    }

    function confirmChangePin() {
      const error = document.getElementById('changePinError');
      const success = document.getElementById('changePinSuccess');

      if (changePinBuffer.length !== 4) {
        error.textContent = 'Please enter exactly 4 digits.';
        return;
      }

      if (changePinBuffer === '0000' || changePinBuffer === '1166') {
        error.textContent = '❌ Please choose a different PIN from default.';
        changePinBuffer = '';
        updateChangePinDots();
        return;
      }

      if (pendingUser) {
        const user = users.find(u => u.id === pendingUser.id);
        if (user) {
          user.pin = changePinBuffer;
          user.needsPinChange = false;
          saveUsers();
          success.textContent = '✅ PIN updated successfully!';
          currentUser = user;
          
          setTimeout(function() {
            document.getElementById('changePinScreen').classList.remove('active');
            loginSuccess();
          }, 500);
        }
      }
    }

    function skipChangePin() {
      if (!confirm('⚠️ Your PIN is still the default. This is not secure. Continue anyway?')) return;
      document.getElementById('changePinScreen').classList.remove('active');
      if (pendingUser) {
        currentUser = pendingUser;
        loginSuccess();
      }
    }

    // ============================================
    // LOGIN SUCCESS
    // ============================================
    function loginSuccess() {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('changePinScreen').classList.remove('active');
      const appScreen = document.getElementById('appScreen');
      appScreen.className = 'app-screen active';

      const avatar = document.getElementById('userAvatar');
      const name = document.getElementById('userName');
      const roleBadge = document.getElementById('userRoleBadge');

      avatar.textContent = currentUser.name.charAt(0).toUpperCase();
      name.textContent = currentUser.name;

      if (currentUser.role === 'super-admin') {
        roleBadge.textContent = '👑 Super Admin';
        roleBadge.className = 'user-role super-admin';
        document.getElementById('adminSection').classList.remove('hidden');
      } else {
        roleBadge.textContent = '👤 Admin';
        roleBadge.className = 'user-role admin';
        document.getElementById('adminSection').classList.add('hidden');
      }

      pinBuffer = '';
      updatePinDots();
      pendingUser = null;

      try {
        const tg = window.Telegram.WebApp;
        tg.expand();
      } catch(e) {}
    }

    function logout() {
      if (!confirm('Logout?')) return;
      currentUser = null;
      selectedUserId = null;
      pinBuffer = '';
      pendingUser = null;
      updatePinDots();
      document.getElementById('appScreen').className = 'app-screen';
      document.getElementById('loginScreen').style.display = 'block';
      document.getElementById('changePinScreen').classList.remove('active');
      document.getElementById('pinError').textContent = '';
      document.getElementById('pinSuccess').textContent = '';
      document.getElementById('changePinError').textContent = '';
      document.getElementById('changePinSuccess').textContent = '';
      changePinBuffer = '';
      updateChangePinDots();
      updateSelectedUserDisplay();
      renderUserSelector();
    }

    // ============================================
    // TOAST NOTIFICATIONS
    // ============================================
    function showToast(message, type) {
      const existing = document.querySelector('.toast');
      if (existing) existing.remove();
      const toast = document.createElement('div');
      toast.className = 'toast ' + type;
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(function() {
        toast.style.opacity = '0';
        toast.style.transition = 'opacity 0.3s ease';
        setTimeout(function() { toast.remove(); }, 300);
      }, 3000);
    }

    // ============================================
    // SHAKE ANIMATION
    // ============================================
    const styleShake = document.createElement('style');
    styleShake.textContent = `
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-10px); }
        75% { transform: translateX(10px); }
      }
    `;
    document.head.appendChild(styleShake);

    // ============================================
    // TELEGRAM WEBAPP
    // ============================================
    try {
      const tg = window.Telegram.WebApp;
      tg.ready();
      tg.expand();
    } catch(e) {
      console.log('Telegram WebApp not available');
    }

    // ============================================
    // DOM ELEMENTS
    // ============================================
    const ipsTextarea = document.getElementById('ips');
    const adoptBtn = document.getElementById('adoptBtn');
    const progress = document.getElementById('progress');
    const progressText = document.getElementById('progressText');
    const resultDiv = document.getElementById('result');
    const totalCount = document.getElementById('totalCount');
    const successCount = document.getElementById('successCount');
    const failCount = document.getElementById('failCount');
    const ipCount = document.getElementById('ipCount');
    const timestamp = document.getElementById('timestamp');
    const progressFill = document.getElementById('progressFill');
    const progressPercent = document.getElementById('progressPercent');

    // ============================================
    // SETUP
    // ============================================
    function setupIPCount() {
      ipsTextarea.addEventListener('input', function() {
        const ips = getIPs();
        ipCount.textContent = ips.length + ' IPs';
        totalCount.textContent = ips.length;
        successCount.textContent = '—';
        failCount.textContent = '—';
      });
    }

    function getIPs() {
      return ipsTextarea.value.split('\n').map(i => i.trim()).filter(Boolean);
    }

    function getIPsWithComments() {
      return ipsTextarea.value.split('\n').map(i => i.trim()).filter(Boolean).filter(i => !i.startsWith('#'));
    }

    function setStats(total, success, fail) {
      totalCount.textContent = total;
      successCount.textContent = success;
      failCount.textContent = fail;
    }

    function showProgress(text, show) {
      progress.className = show ? 'active' : '';
      progressText.textContent = text;
    }

    function setTimestamp() {
      timestamp.textContent = new Date().toLocaleTimeString();
    }

    function clearAll() {
      ipsTextarea.value = '';
      resultDiv.innerHTML = '';
      showProgress('', false);
      ipCount.textContent = '0 IPs';
      totalCount.textContent = '0';
      successCount.textContent = '—';
      failCount.textContent = '—';
      adoptBtn.disabled = false;
      adoptBtn.classList.remove('progress-active');
      progressFill.style.width = '0%';
      progressPercent.textContent = '';
      updateButtonContent('🚀', 'Adopt All APs', '');
    }

    function loadSample() {
      ipsTextarea.value = '192.168.1.10\n192.168.1.11\n192.168.1.12\n192.168.1.13\n192.168.1.14';
      ipsTextarea.dispatchEvent(new Event('input'));
    }

    function updateButtonContent(icon, label, progressText) {
      const btnContent = adoptBtn.querySelector('.btn-content');
      if (btnContent) {
        btnContent.innerHTML = `
          <span class="btn-icon">${icon}</span>
          <span class="btn-label">${label}</span>
          ${progressText ? `<span class="btn-progress-text">${progressText}</span>` : ''}
        `;
      }
    }

    function updateProgress(percentage, label) {
      progressFill.style.width = percentage + '%';
      if (percentage > 0 && percentage < 100) {
        progressPercent.textContent = Math.round(percentage) + '%';
      } else if (percentage >= 100) {
        progressPercent.textContent = '✓';
        progressPercent.style.color = '#4CAF50';
      } else {
        progressPercent.textContent = '';
      }
      if (label) {
        updateButtonContent('⚡', 'Adopting...', label);
      }
    }

    function resetButton() {
      adoptBtn.disabled = false;
      adoptBtn.classList.remove('progress-active');
      progressFill.style.width = '0%';
      progressPercent.textContent = '';
      progressPercent.style.color = 'rgba(255,255,255,0.9)';
      updateButtonContent('🚀', 'Adopt All APs', '');
    }

    function filterResults(filter) {
      currentFilter = filter;
      var items = document.querySelectorAll('.result-item');
      var visibleCount = 0;
      for (var i = 0; i < items.length; i++) {
        var item = items[i];
        var isSuccess = item.getAttribute('data-success') === 'true';
        var show = false;
        if (filter === 'all') show = true;
        else if (filter === 'success') show = isSuccess;
        else if (filter === 'failed') show = !isSuccess;
        if (show) {
          item.classList.remove('hidden');
          visibleCount++;
        } else {
          item.classList.add('hidden');
        }
      }
      var btns = document.querySelectorAll('.filter-btn');
      for (var j = 0; j < btns.length; j++) {
        var btn = btns[j];
        btn.className = 'filter-btn';
        if (btn.getAttribute('data-filter') === filter) {
          btn.classList.add('active-' + filter);
        }
      }
      var noResults = document.querySelector('.no-results');
      if (noResults) {
        if (visibleCount === 0 && items.length > 0) {
          noResults.style.display = 'block';
        } else {
          noResults.style.display = 'none';
        }
      }
    }

    function retryAp(ip) {
      if (!confirm('Retry adopting ' + ip + '?')) return;
      var btn = document.querySelector('.result-item[data-ip="' + ip + '"] .retry-btn');
      if (btn) {
        btn.textContent = '⏳';
        btn.disabled = true;
      }
      fetch('https://unifi-bulk-adopter-production.up.railway.app/adopt-bulk', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ips: [ip] })
      })
      .then(function(res) { return res.json(); })
      .then(function(data) {
        var result = data.results[0];
        var item = document.querySelector('.result-item[data-ip="' + ip + '"]');
        if (item) {
          if (result.success) {
            item.setAttribute('data-success', 'true');
            var statusEl = item.querySelector('.status');
            statusEl.className = 'status success';
            statusEl.textContent = '✅ Adopted';
            var err = item.querySelector('.error-msg');
            if (err) err.remove();
            var retry = item.querySelector('.retry-btn');
            if (retry) retry.remove();
          } else {
            var errMsg = item.querySelector('.error-msg');
            if (!errMsg) {
              errMsg = document.createElement('span');
              errMsg.className = 'error-msg';
              item.appendChild(errMsg);
            }
            errMsg.textContent = result.error || 'Retry failed';
          }
        }
        var success = document.querySelectorAll('.result-item[data-success="true"]').length;
        var failed = document.querySelectorAll('.result-item[data-success="false"]').length;
        setStats(success + failed, success, failed);
        filterResults('all');
      })
      .catch(function(err) {
        alert('Error retrying: ' + err.message);
      });
    }

    async function startAdoption() {
      const ips = getIPsWithComments();
      if (ips.length === 0) {
        alert('Please paste at least one IP address.');
        return;
      }
      if (!confirm('Adopt ' + ips.length + ' AP(s)?')) return;

      adoptBtn.disabled = true;
      adoptBtn.classList.add('progress-active');
      updateProgress(0, 'Starting...');
      showProgress('⏳ Processing ' + ips.length + ' APs...', true);
      setStats(ips.length, '…', '…');

      try {
        const steps = [
          { progress: 10, label: 'Connecting...' },
          { progress: 25, label: 'Authenticating...' },
          { progress: 40, label: 'Sending commands...' },
          { progress: 55, label: 'Processing...' },
          { progress: 70, label: 'Almost done...' },
          { progress: 85, label: 'Finalizing...' }
        ];
        for (const step of steps) {
          await new Promise(resolve => setTimeout(resolve, 300 + Math.random() * 400));
          updateProgress(step.progress, step.label);
        }

        const response = await fetch('https://unifi-bulk-adopter-production.up.railway.app/adopt-bulk', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ips: ips })
        });
        const data = await response.json();
        updateProgress(100, 'Complete!');
        await new Promise(resolve => setTimeout(resolve, 500));

        let success = 0;
        let fail = 0;
        let html = '';
        html += '<div class="filter-buttons">';
        html += '<button class="filter-btn active-all" data-filter="all" onclick="filterResults(\'all\')">📊 All (' + data.total + ')</button>';
        html += '<button class="filter-btn" data-filter="success" onclick="filterResults(\'success\')">✅ Success (0)</button>';
        html += '<button class="filter-btn" data-filter="failed" onclick="filterResults(\'failed\')">❌ Failed (0)</button>';
        html += '</div>';
        html += '<div class="result-summary">';
        html += '<span class="total">✅ Completed! ' + data.successful + '/' + data.total + ' successful</span>';
        html += '<div class="stats-mini">';
        html += '<span class="ok">✅ ' + data.successful + '</span>';
        html += '<span class="fail">❌ ' + (data.total - data.successful) + '</span>';
        html += '</div></div>';
        html += '<div class="result-list">';
        for (var i = 0; i < data.results.length; i++) {
          var r = data.results[i];
          if (r.success) success++;
          else fail++;
          html += '<div class="result-item" data-ip="' + r.ip + '" data-success="' + r.success + '">';
          html += '<span class="ip">' + r.ip + '</span>';
          html += '<span class="status ' + (r.success ? 'success' : 'fail') + '">' + (r.success ? '✅ Adopted' : '❌ Failed') + '</span>';
          if (r.error) html += '<span class="error-msg">' + r.error + '</span>';
          if (!r.success) html += '<button class="retry-btn" onclick="retryAp(\'' + r.ip + '\')">🔄 Retry</button>';
          html += '</div>';
        }
        html += '</div>';
        resultDiv.innerHTML = html;

        var btns = document.querySelectorAll('.filter-btn');
        for (var j = 0; j < btns.length; j++) {
          var btn = btns[j];
          if (btn.getAttribute('data-filter') === 'success') {
            btn.textContent = '✅ Success (' + success + ')';
          }
          if (btn.getAttribute('data-filter') === 'failed') {
            btn.textContent = '❌ Failed (' + fail + ')';
          }
        }
        setStats(data.total, data.successful, data.total - data.successful);
        showProgress('✅ Complete! ' + data.successful + '/' + data.total + ' successful', false);
        setTimeout(resetButton, 1000);
        try {
          const tg = window.Telegram.WebApp;
          tg.sendData(JSON.stringify({ total: data.total, successful: data.successful, failed: data.total - data.successful }));
        } catch(e) {}
      } catch(err) {
        resultDiv.innerHTML = '<div class="result-item" style="border-color: rgba(239,83,80,0.2);"><span style="color:#ef5350;">❌ Error: ' + err.message + '</span></div>';
        showProgress('❌ Error: ' + err.message, false);
        setStats(ips.length, 0, ips.length);
        updateProgress(100, 'Failed');
        setTimeout(resetButton, 1500);
      }
    }

    ipsTextarea.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        startAdoption();
      }
    });

    // ============================================
    // INIT
    // ============================================
    init();
  </script>
</body>
</html>
